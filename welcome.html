<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Projet RIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #008751;
            --secondary: #FCD116;
            --accent: #EF3340;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light: #f4f7f4;
            --white: #ffffff;
            --blue-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        
        .welcome-card {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-container {
            margin-bottom: 30px;
        }
        
        .logo-container img {
            height: 80px;
            margin-bottom: 15px;
        }
        
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .welcome-text {
            font-size: 1.1rem;
            color: var(--gray);
            margin-bottom: 35px;
            line-height: 1.6;
        }
        
        .user-name {
            color: var(--dark);
            font-weight: 800;
            display: block;
            font-size: 1.5rem;
            margin-top: 10px;
        }
        
        .btn-dashboard {
            display: inline-block;
            width: 100%;
            height: 55px;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            line-height: 55px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 135, 81, 0.2);
        }
        
        .btn-dashboard:hover {
            background-color: #006b40;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 135, 81, 0.3);
        }
        
        .celebration-icons {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--secondary);
        }
        
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .welcome-card { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="logo-container">
            <img src="assets/images/Screenshot_20260325-094957.jpg" alt="Projet RIS Logo">
        </div>
        
        <div class="celebration-icons">
            <i class="fas fa-trophy"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-medal"></i>
        </div>
        
        <h1>Welcome to the Team!</h1>
        <p class="welcome-text">
            We are thrilled to have you join Projet RIS. Your journey to mastering digital skills and building your future starts now.
            <span class="user-name" id="display-name">Student</span>
        </p>
        
        <a href="studentsdashboard.html" class="btn-dashboard">Go to My Dashboard</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get the name from localStorage (set during registration)
            const userName = localStorage.getItem('ris_user_name') || 'Student';
            document.getElementById('display-name').textContent = userName;
        });
    </script>
</body>
</html>
