<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RIS Architecture Diagram</title>
<style>
  body { background:#f8f9fa; font-family:'Segoe UI',Arial,sans-serif; display:flex; flex-direction:column; align-items:center; padding:30px; }
  h2 { color:#1a3a5c; font-size:16px; margin-bottom:4px; }
  p.caption { color:#555; font-size:13px; margin-top:4px; font-style:italic; }
</style>
</head>
<body>
<h2>Figure 3.3 — Layered Architecture of the RIS Platform</h2>
<p class="caption">Three-tier separation: Presentation, Application, and Data layers</p>
<svg width="720" height="560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#444"/>
    </marker>
    <marker id="arrup" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#888"/>
    </marker>
  </defs>

  <!-- ========== USER / BROWSER ========== -->
  <rect x="230" y="20" width="260" height="54" rx="8" fill="#34495e" stroke="#1a2c3a" stroke-width="2"/>
  <text x="360" y="44" text-anchor="middle" fill="white" font-size="14" font-weight="bold">User (Browser)</text>
  <text x="360" y="62" text-anchor="middle" fill="#ccc" font-size="11">Chrome / Firefox / Mobile Browser</text>

  <!-- arrow down -->
  <line x1="360" y1="74" x2="360" y2="102" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="368" y="94" fill="#888" font-size="10">HTTP Request</text>
  <!-- arrow up -->
  <line x1="348" y1="100" x2="348" y2="76" stroke="#888" stroke-width="1.5" marker-end="url(#arrup)" stroke-dasharray="4,3"/>
  <text x="290" y="94" fill="#888" font-size="10">HTML Response</text>

  <!-- ========== LAYER 1: PRESENTATION ========== -->
  <rect x="60" y="106" width="600" height="130" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <rect x="60" y="106" width="600" height="28" rx="10" fill="#2563eb"/>
  <rect x="60" y="120" width="600" height="14" rx="0" fill="#2563eb"/>
  <text x="360" y="126" text-anchor="middle" fill="white" font-size="13" font-weight="bold">LAYER 1 — PRESENTATION LAYER</text>

  <!-- three boxes inside layer 1 -->
  <rect x="80" y="144" width="160" height="80" rx="6" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <text x="160" y="162" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">HTML5</text>
  <text x="160" y="178" text-anchor="middle" fill="#444" font-size="10">Page Structure</text>
  <text x="160" y="192" text-anchor="middle" fill="#444" font-size="10">Semantic Markup</text>
  <text x="160" y="206" text-anchor="middle" fill="#444" font-size="10">Forms &amp; Content</text>

  <rect x="280" y="144" width="160" height="80" rx="6" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <text x="360" y="162" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">CSS3</text>
  <text x="360" y="178" text-anchor="middle" fill="#444" font-size="10">Mobile-First Layout</text>
  <text x="360" y="192" text-anchor="middle" fill="#444" font-size="10">Responsive Design</text>
  <text x="360" y="206" text-anchor="middle" fill="#444" font-size="10">Media Queries</text>

  <rect x="480" y="144" width="160" height="80" rx="6" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <text x="560" y="162" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">JavaScript</text>
  <text x="560" y="178" text-anchor="middle" fill="#444" font-size="10">Form Validation</text>
  <text x="560" y="192" text-anchor="middle" fill="#444" font-size="10">Dynamic Content</text>
  <text x="560" y="206" text-anchor="middle" fill="#444" font-size="10">Dashboard Tabs</text>

  <!-- arrow down -->
  <line x1="360" y1="236" x2="360" y2="264" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="368" y="254" fill="#888" font-size="10">PHP function calls</text>
  <line x1="348" y1="262" x2="348" y2="238" stroke="#888" stroke-width="1.5" marker-end="url(#arrup)" stroke-dasharray="4,3"/>
  <text x="275" y="254" fill="#888" font-size="10">Rendered HTML / JSON</text>

  <!-- ========== LAYER 2: APPLICATION ========== -->
  <rect x="60" y="268" width="600" height="130" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <rect x="60" y="268" width="600" height="28" rx="10" fill="#16a34a"/>
  <rect x="60" y="282" width="600" height="14" rx="0" fill="#16a34a"/>
  <text x="360" y="288" text-anchor="middle" fill="white" font-size="13" font-weight="bold">LAYER 2 — APPLICATION LAYER (PHP)</text>

  <rect x="80" y="306" width="150" height="80" rx="6" fill="white" stroke="#16a34a" stroke-width="1.5"/>
  <text x="155" y="324" text-anchor="middle" fill="#15803d" font-size="12" font-weight="bold">Auth Module</text>
  <text x="155" y="340" text-anchor="middle" fill="#444" font-size="10">Login / Register</text>
  <text x="155" y="354" text-anchor="middle" fill="#444" font-size="10">Session Mgmt</text>
  <text x="155" y="368" text-anchor="middle" fill="#444" font-size="10">RBAC Checks</text>

  <rect x="250" y="306" width="150" height="80" rx="6" fill="white" stroke="#16a34a" stroke-width="1.5"/>
  <text x="325" y="324" text-anchor="middle" fill="#15803d" font-size="12" font-weight="bold">Course Module</text>
  <text x="325" y="340" text-anchor="middle" fill="#444" font-size="10">Catalog Logic</text>
  <text x="325" y="354" text-anchor="middle" fill="#444" font-size="10">Enrollment Logic</text>
  <text x="325" y="368" text-anchor="middle" fill="#444" font-size="10">Progress Updates</text>

  <rect x="420" y="306" width="150" height="80" rx="6" fill="white" stroke="#16a34a" stroke-width="1.5"/>
  <text x="495" y="324" text-anchor="middle" fill="#15803d" font-size="12" font-weight="bold">Classroom Module</text>
  <text x="495" y="340" text-anchor="middle" fill="#444" font-size="10">Session Control</text>
  <text x="495" y="354" text-anchor="middle" fill="#444" font-size="10">Chat Handler</text>
  <text x="495" y="368" text-anchor="middle" fill="#444" font-size="10">File Upload</text>

  <!-- arrow down -->
  <line x1="360" y1="398" x2="360" y2="426" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="368" y="417" fill="#888" font-size="10">SQL Queries (PDO)</text>
  <line x1="348" y1="424" x2="348" y2="400" stroke="#888" stroke-width="1.5" marker-end="url(#arrup)" stroke-dasharray="4,3"/>
  <text x="270" y="417" fill="#888" font-size="10">Result Sets</text>

  <!-- ========== LAYER 3: DATA ========== -->
  <rect x="60" y="430" width="600" height="110" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <rect x="60" y="430" width="600" height="28" rx="10" fill="#ca8a04"/>
  <rect x="60" y="444" width="600" height="14" rx="0" fill="#ca8a04"/>
  <text x="360" y="450" text-anchor="middle" fill="white" font-size="13" font-weight="bold">LAYER 3 — DATA LAYER (MySQL via XAMPP)</text>

  <rect x="88"  y="468" width="100" height="60" rx="5" fill="white" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="138" y="490" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">users</text>
  <text x="138" y="506" text-anchor="middle" fill="#555" font-size="10">5 fields</text>
  <text x="138" y="519" text-anchor="middle" fill="#555" font-size="10">all roles</text>

  <rect x="204" y="468" width="100" height="60" rx="5" fill="white" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="254" y="490" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">courses</text>
  <text x="254" y="506" text-anchor="middle" fill="#555" font-size="10">7 fields</text>
  <text x="254" y="519" text-anchor="middle" fill="#555" font-size="10">FK: mentor_id</text>

  <rect x="320" y="468" width="110" height="60" rx="5" fill="white" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="375" y="490" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">enrollments</text>
  <text x="375" y="506" text-anchor="middle" fill="#555" font-size="10">4 fields</text>
  <text x="375" y="519" text-anchor="middle" fill="#555" font-size="10">FK: student+course</text>

  <rect x="446" y="468" width="100" height="60" rx="5" fill="white" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="496" y="490" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">sessions</text>
  <text x="496" y="506" text-anchor="middle" fill="#555" font-size="10">6 fields</text>
  <text x="496" y="519" text-anchor="middle" fill="#555" font-size="10">FK: course+mentor</text>

  <rect x="562" y="468" width="88" height="60" rx="5" fill="white" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="606" y="490" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">progress</text>
  <text x="606" y="506" text-anchor="middle" fill="#555" font-size="10">5 fields</text>
  <text x="606" y="519" text-anchor="middle" fill="#555" font-size="10">FK: student+course</text>
</svg>
<p class="caption">Arrows indicate direction of data flow. Dashed arrows indicate response/return path.</p>
</body>
</html>
