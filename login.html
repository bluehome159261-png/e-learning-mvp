<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projet RIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #008751;
            --secondary: #FCD116;
            --accent: #EF3340;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light: #f4f7f4;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            margin: auto;
            background: var(--white);
            padding: 35px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        .logo-header {
            margin-bottom: 30px;
        }
        
        .logo-header img {
            height: 60px;
            width: auto;
            margin-bottom: 12px;
        }
        
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.7rem;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--gray);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--dark);
        }
        
        input {
            width: 100%;
            height: 50px; /* 44px+ touch target */
            padding: 0 15px;
            border: 1.5px solid #e1e1e1;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background-color: var(--white);
            transition: var(--transition);
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1);
        }
        
        .forgot-password {
            text-align: right;
            margin-top: -12px;
            margin-bottom: 25px;
        }
        
        .forgot-password a {
            color: var(--gray);
            font-size: 0.85rem;
            text-decoration: none;
            transition: var(--transition);
        }
        
        .forgot-password a:hover {
            color: var(--primary);
        }
        
        .btn-login {
            width: 100%;
            height: 52px;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 5px;
        }
        
        .btn-login:hover {
            background-color: #006b40;
            transform: translateY(-1px);
        }
        
        .footer-links {
            margin-top: 30px;
            font-size: 0.95rem;
            color: var(--gray);
        }
        
        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        
        /* Mobile-first adjustments */
        @media (max-width: 360px) {
            .login-container {
                padding: 25px 15px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-header">
            <a href="index.html">
                <img src="assets/images/Screenshot_20260325-094957.jpg" alt="Projet RIS Logo">
            </a>
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to your RIS account</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn-login">Log In</button>
        </form>
        
        <div class="footer-links">
            Don't have an account? <a href="register.html">Register now</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                alert('Login submitted! (Backend integration in Phase 2)');
            });
        });
    </script>
</body>
</html>
