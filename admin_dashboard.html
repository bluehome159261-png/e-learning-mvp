<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIS | Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --green: #008751;
    --gold: #FCD116;
    --red: #EF3340;
    --grey: #9ca3af;
    --dark: #1a1a2e;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: #1a1a2e;
    min-height: 100vh;
  }

  h1,h2,h3,h4,h5 { font-family: 'Montserrat', sans-serif; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    position: fixed;
    left: 0; top: 0;
    width: 280px;
    height: 100vh;
    background: var(--card);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    z-index: 40;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 24px 24px 16px;
    border-bottom: 1px solid #f1f5f9;
  }

  .sidebar-logo .logo-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--green);
    letter-spacing: -0.5px;
  }

  .sidebar-logo .logo-text span { color: var(--gold); }

  .sidebar-profile {
    padding: 20px 24px;
    border-bottom: 1px solid #f1f5f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
  }

  .sidebar-profile .user-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #1a1a2e;
  }

  .sidebar-profile .user-specialty {
    font-size: 12px;
    color: var(--grey);
    font-weight: 500;
  }

  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: var(--grey);
    font-weight: 500;
    font-size: 14px;
    text-decoration: none;
    border-left: 3px solid transparent;
  }

  .nav-item:hover { background: #f8fafc; color: var(--green); }

  .nav-item.active {
    color: var(--green);
    background: rgba(0,135,81,0.06);
    border-left: 3px solid var(--green);
    font-weight: 600;
  }

  .nav-item i { width: 20px; font-size: 16px; text-align: center; }

  /* ===== AVATAR ===== */
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
    background: var(--green);
    color: #fff;
  }

  /* ===== MAIN FEED ===== */
  .main-feed {
    margin-left: 280px;
    min-height: 100vh;
    padding: 24px 24px 100px;
  }

  /* ===== HEADER ===== */
  .feed-header {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    position: sticky;
    top: 12px;
    z-index: 30;
  }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .icon-btn {
    position: relative;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--bg);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #606770;
    font-size: 18px;
  }

  .notif-dot {
    position: absolute;
    top: 2px; right: 2px;
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    border: 2px solid var(--card);
  }

  /* Mobile */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main-feed { margin-left: 0; padding: 10px; }
  }
</style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">Projet <span>RIS</span></div>
    </div>
    <div class="sidebar-profile">
      <div class="avatar lg">RA</div>
      <div class="user-name">Projet RIS Admin</div>
      <div class="user-specialty">bmuehome159261@gmail.com</div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-users"></i> User Manager</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-clipboard-list"></i> Specialties</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-envelope"></i> System Logs</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-feed">
    <header class="feed-header">
      <div style="font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 18px;">Command Center</div>
      <div class="header-right">
        <button class="icon-btn">
          <i class="fa-solid fa-bell"></i>
          <div class="notif-dot"></div>
        </button>
        <div class="avatar">RA</div>
      </div>
    </header>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
        <div style="background: white; padding: 20px; border-radius: 14px; box-shadow: var(--shadow);">
            <div style="color: var(--grey); font-size: 12px; font-weight: 700; text-transform: uppercase;">Total Users</div>
            <div style="font-size: 28px; font-weight: 900; margin-top: 5px;">247</div>
        </div>
        <div style="background: white; padding: 20px; border-radius: 14px; box-shadow: var(--shadow);">
            <div style="color: var(--grey); font-size: 12px; font-weight: 700; text-transform: uppercase;">Active Mentors</div>
            <div style="font-size: 28px; font-weight: 900; margin-top: 5px;">12</div>
        </div>
        <div style="background: white; padding: 20px; border-radius: 14px; box-shadow: var(--shadow);">
            <div style="color: var(--grey); font-size: 12px; font-weight: 700; text-transform: uppercase;">Revenue</div>
            <div style="font-size: 28px; font-weight: 900; margin-top: 5px;">8.4M FCFA</div>
        </div>
    </div>

    <div style="background: white; padding: 20px; border-radius: 14px; box-shadow: var(--shadow);">
        <h3 style="margin-bottom: 15px;">Pending Verifications</h3>
        <p style="color: var(--grey); font-size: 14px;">No pending mentor verifications at the moment.</p>
    </div>
  </main>

</body>
</html>
