<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RIS Enrollment Flowchart</title>
<style>
  body { background:#f8f9fa; font-family:'Segoe UI',Arial,sans-serif; display:flex; flex-direction:column; align-items:center; padding:30px; }
  h2 { color:#1a3a5c; font-size:16px; margin-bottom:4px; }
  p.caption { color:#555; font-size:13px; margin-top:4px; font-style:italic; }
</style>
</head>
<body>
<h2>Figure 4.1 — Student Enrollment Flowchart</h2>
<p class="caption">Decision flow from login through to joining a virtual classroom session</p>
<svg width="460" height="820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrd" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#1a3a5c"/>
    </marker>
    <marker id="arrl" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- START -->
  <ellipse cx="230" cy="36" rx="70" ry="24" fill="#1a3a5c"/>
  <text x="230" y="41" text-anchor="middle" fill="white" font-size="13" font-weight="bold">START</text>
  <line x1="230" y1="60" x2="230" y2="84" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Box 1: Visit platform -->
  <rect x="120" y="84" width="220" height="44" rx="7" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
  <text x="230" y="102" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">Student visits platform</text>
  <text x="230" y="118" text-anchor="middle" fill="#1e40af" font-size="11">(login page)</text>
  <line x1="230" y1="128" x2="230" y2="152" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Decision: Has account? -->
  <polygon points="230,152 340,188 230,224 120,188" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.8"/>
  <text x="230" y="185" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold">Has account?</text>
  <!-- YES arrow down -->
  <line x1="230" y1="224" x2="230" y2="252" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="238" y="244" fill="#15803d" font-size="11" font-weight="bold">YES</text>
  <!-- NO arrow right -->
  <line x1="340" y1="188" x2="390" y2="188" stroke="#c0392b" stroke-width="2" marker-end="url(#arrl)"/>
  <text x="346" y="182" fill="#c0392b" font-size="11" font-weight="bold">NO</text>
  <!-- Register box -->
  <rect x="390" y="170" width="60" height="36" rx="5" fill="#fee2e2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="420" y="185" text-anchor="middle" fill="#991b1b" font-size="10">Register</text>
  <text x="420" y="198" text-anchor="middle" fill="#991b1b" font-size="10">account</text>
  <!-- Arrow from register back down to login -->
  <line x1="420" y1="206" x2="420" y2="240" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="420" y1="240" x2="242" y2="240" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrl)"/>

  <!-- Box 2: Login -->
  <rect x="120" y="252" width="220" height="44" rx="7" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
  <text x="230" y="270" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">Enter credentials</text>
  <text x="230" y="286" text-anchor="middle" fill="#1e40af" font-size="11">(email + password)</text>
  <line x1="230" y1="296" x2="230" y2="320" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Decision: Valid credentials? -->
  <polygon points="230,320 350,356 230,392 110,356" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.8"/>
  <text x="230" y="352" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold">Credentials valid?</text>
  <!-- YES arrow down -->
  <line x1="230" y1="392" x2="230" y2="420" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="238" y="412" fill="#15803d" font-size="11" font-weight="bold">YES</text>
  <!-- NO arrow left -->
  <line x1="110" y1="356" x2="60" y2="356" stroke="#c0392b" stroke-width="2" marker-end="url(#arrl)"/>
  <text x="70" y="350" fill="#c0392b" font-size="11" font-weight="bold">NO</text>
  <rect x="10" y="338" width="52" height="36" rx="5" fill="#fee2e2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="36" y="353" text-anchor="middle" fill="#991b1b" font-size="10">Show</text>
  <text x="36" y="366" text-anchor="middle" fill="#991b1b" font-size="10">error</text>
  <line x1="36" y1="302" x2="36" y2="338" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrl)"/>
  <line x1="36" y1="302" x2="120" y2="302" stroke="#c0392b" stroke-width="1.5"/>

  <!-- Box 3: Dashboard -->
  <rect x="120" y="420" width="220" height="44" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="230" y="438" text-anchor="middle" fill="#15803d" font-size="12" font-weight="bold">Dashboard loaded</text>
  <text x="230" y="454" text-anchor="middle" fill="#15803d" font-size="11">(role-based view)</text>
  <line x1="230" y1="464" x2="230" y2="488" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Box 4: Browse catalog -->
  <rect x="120" y="488" width="220" height="44" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="230" y="506" text-anchor="middle" fill="#15803d" font-size="12" font-weight="bold">Browse course catalog</text>
  <text x="230" y="522" text-anchor="middle" fill="#15803d" font-size="11">(filter by specialty)</text>
  <line x1="230" y1="532" x2="230" y2="556" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Decision: Already enrolled? -->
  <polygon points="230,556 350,590 230,624 110,590" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.8"/>
  <text x="230" y="586" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold">Already enrolled?</text>
  <!-- YES right -->
  <line x1="350" y1="590" x2="420" y2="590" stroke="#c0392b" stroke-width="2" marker-end="url(#arrl)"/>
  <text x="356" y="584" fill="#c0392b" font-size="11" font-weight="bold">YES</text>
  <rect x="420" y="573" width="32" height="34" rx="5" fill="#fee2e2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="436" y="586" text-anchor="middle" fill="#991b1b" font-size="9">Go to</text>
  <text x="436" y="598" text-anchor="middle" fill="#991b1b" font-size="9">class</text>
  <!-- NO down -->
  <line x1="230" y1="624" x2="230" y2="648" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="238" y="642" fill="#15803d" font-size="11" font-weight="bold">NO</text>

  <!-- Box 5: Enroll -->
  <rect x="120" y="648" width="220" height="44" rx="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="230" y="666" text-anchor="middle" fill="#5b21b6" font-size="12" font-weight="bold">Enroll in course</text>
  <text x="230" y="682" text-anchor="middle" fill="#5b21b6" font-size="11">(INSERT into enrollments)</text>
  <line x1="230" y1="692" x2="230" y2="716" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- END -->
  <rect x="130" y="716" width="200" height="44" rx="7" fill="#1a3a5c" stroke="#0f2233" stroke-width="1.8"/>
  <text x="230" y="734" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Join Virtual Classroom</text>
  <text x="230" y="750" text-anchor="middle" fill="#aac" font-size="11">(session begins)</text>
  <line x1="230" y1="760" x2="230" y2="790" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrd)"/>

  <ellipse cx="230" cy="800" rx="50" ry="18" fill="#1a3a5c"/>
  <text x="230" y="805" text-anchor="middle" fill="white" font-size="12" font-weight="bold">END</text>
</svg>
<p class="caption">Yellow diamonds = decision points &nbsp;|&nbsp; Blue/green rectangles = process steps &nbsp;|&nbsp; Red paths = error or alternate routes</p>
</body>
</html>
