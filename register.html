<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Projet RIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #008751;
            --secondary: #FCD116;
            --accent: #EF3340;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light: #f4f7f4;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .register-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-container img {
            height: 60px;
            margin-bottom: 10px;
        }
        
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 10px;
            color: var(--primary);
        }
        
        p.subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
            min-height: 44px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1);
        }
        
        .phone-input-group {
            display: flex;
            gap: 10px;
        }
        
        .phone-input-group select {
            width: 120px;
            flex-shrink: 0;
        }
        
        .btn-register {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            min-height: 44px;
        }
        
        .btn-register:hover {
            background: #006b40;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        
        #mentor-passkey-group {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 480px) {
            .register-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo-container">
            <a href="index.html">
                <img src="assets/images/Screenshot_20260325-094957.jpg" alt="Projet RIS Logo">
            </a>
            <h1>Create Account</h1>
            <p class="subtitle">Join the RIS community today</p>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="phone-input-group">
                    <select id="country-code" name="country-code">
                        <option value="+237" selected>🇨🇲 +237</option>
                        <option value="+234">🇳🇬 +234</option>
                        <option value="+221">🇸🇳 +221</option>
                        <option value="+225">🇨🇮 +225</option>
                        <option value="+233">🇬🇭 +233</option>
                        <option value="+254">🇰🇪 +254</option>
                        <option value="+212">🇲🇦 +212</option>
                        <option value="+20">🇪🇬 +20</option>
                        <option value="+27">🇿🇦 +27</option>
                    </select>
                    <input type="tel" id="phone" name="phone" placeholder="6XX XXX XXX" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="role">I am a...</label>
                <select id="role" name="role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="student">Student (Athlete/Youth)</option>
                    <option value="mentor">Mentor (Consultant)</option>
                </select>
            </div>
            
            <div id="mentor-passkey-group" class="form-group">
                <label for="passkey">Mentor Passkey</label>
                <input type="password" id="passkey" name="passkey" placeholder="Enter your mentor verification code">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>
            
            <button type="submit" class="btn-register">Register Now</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const roleSelect = document.getElementById('role');
            const mentorPasskeyGroup = document.getElementById('mentor-passkey-group');
            const passkeyInput = document.getElementById('passkey');
            const registerForm = document.getElementById('registerForm');

            // Role selection logic
            roleSelect.addEventListener('change', (e) => {
                if (e.target.value === 'mentor') {
                    mentorPasskeyGroup.style.display = 'block';
                    passkeyInput.setAttribute('required', 'required');
                } else {
                    mentorPasskeyGroup.style.display = 'none';
                    passkeyInput.removeAttribute('required');
                }
            });

            // Form submission
            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                // For MVP, we just log the data and show a message
                const formData = new FormData(registerForm);
                const data = Object.fromEntries(formData.entries());
                
                console.log('Registration Data:', data);
                alert('Registration successful! (This is a frontend demo. Backend integration is Phase 2)');
                
                // Redirect to login or dashboard
                // window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
