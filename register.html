<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Projet RIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #008751;
            --secondary: #FCD116;
            --accent: #EF3340;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light: #f4f7f4;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
        }
        
        .register-container {
            width: 100%;
            max-width: 450px;
            margin: auto;
            background: var(--white);
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .logo-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .logo-header img {
            height: 55px;
            width: auto;
            margin-bottom: 10px;
        }
        
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        
        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: var(--dark);
        }
        
        input, select {
            width: 100%;
            height: 48px; /* Ensuring 44px+ touch target */
            padding: 0 15px;
            border: 1.5px solid #e1e1e1;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background-color: var(--white);
            transition: var(--transition);
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1);
        }
        
        .phone-row {
            display: flex;
            gap: 10px;
        }
        
        .phone-row select {
            width: 110px;
            flex-shrink: 0;
        }
        
        #mentor-passkey-group {
            display: none;
            background: #fff9e6;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--secondary);
            margin-bottom: 18px;
        }
        
        .btn-submit {
            width: 100%;
            height: 52px;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        
        .btn-submit:hover {
            background-color: #006b40;
            transform: translateY(-1px);
        }
        
        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        
        /* Mobile-first adjustments */
        @media (max-width: 360px) {
            .register-container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo-header">
            <a href="index.html">
                <img src="assets/images/Screenshot_20260325-094957.jpg" alt="Projet RIS Logo">
            </a>
            <h1>Create Account</h1>
            <p class="subtitle">Join the RIS community today</p>
        </div>
        
        <form id="regForm">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="e.g. Jean-Paul Biya" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="phone-row">
                    <select id="country" name="country">
                        <option value="+237" selected>🇨🇲 +237</option>
                        <option value="+234">🇳🇬 +234</option>
                        <option value="+221">🇸🇳 +221</option>
                        <option value="+225">🇨🇮 +225</option>
                        <option value="+233">🇬🇭 +233</option>
                    </select>
                    <input type="tel" id="phone" name="phone" placeholder="6XX XXX XXX" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="role">Register as</label>
                <select id="role" name="role" required>
                    <option value="" disabled selected>Choose your role</option>
                    <option value="student">Student (Athlete/Youth)</option>
                    <option value="mentor">Mentor (Consultant)</option>
                </select>
            </div>
            
            <div id="mentor-passkey-group" class="form-group">
                <label for="passkey">Mentor Passkey</label>
                <input type="password" id="passkey" name="passkey" placeholder="Enter verification code">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
            </div>
            
            <button type="submit" class="btn-submit">Register Now</button>
        </form>
        
        <div class="footer-links">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const roleSelect = document.getElementById('role');
            const passkeyGroup = document.getElementById('mentor-passkey-group');
            const passkeyInput = document.getElementById('passkey');

            roleSelect.addEventListener('change', function() {
                if (this.value === 'mentor') {
                    passkeyGroup.style.display = 'block';
                    passkeyInput.setAttribute('required', 'required');
                } else {
                    passkeyGroup.style.display = 'none';
                    passkeyInput.removeAttribute('required');
                }
            });

            document.getElementById('regForm').addEventListener('submit', function(e) {
                e.preventDefault();
                alert('Registration submitted! (Backend integration in Phase 2)');
            });
        });
    </script>
</body>
</html>
