<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Projet RIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #008751;
            --secondary: #FCD116;
            --accent: #EF3340;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light: #f4f7f4;
            --white: #ffffff;
            --blue-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 15px;
        }
        
        .register-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
        }
        
        /* The Blue Curved Header Style from Version 1 */
        .card-header {
            background: var(--blue-gradient);
            padding: 40px 30px;
            text-align: center;
            color: white;
            position: relative;
            border-bottom-left-radius: 50% 20px;
            border-bottom-right-radius: 50% 20px;
        }
        
        .card-header img {
            height: 60px;
            margin-bottom: 15px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        
        .card-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .card-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        /* Form Content Area */
        .card-body {
            padding: 30px 25px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: var(--dark);
        }
        
        input, select {
            width: 100%;
            height: 48px; /* 44px+ touch target */
            padding: 0 15px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background-color: #f9f9f9;
            transition: var(--transition);
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1);
        }
        
        .phone-row {
            display: flex;
            gap: 10px;
        }
        
        .phone-row select {
            width: 110px;
            flex-shrink: 0;
        }
        
        #mentor-passkey-group {
            display: none;
            background: #fff9e6;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed var(--secondary);
            margin-bottom: 18px;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Terms Checkbox */
        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .terms-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            cursor: pointer;
        }
        
        .terms-group label {
            font-weight: 400;
            font-size: 0.85rem;
            color: var(--gray);
            cursor: pointer;
        }
        
        .terms-group label a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .btn-submit {
            width: 100%;
            height: 52px;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0, 135, 81, 0.2);
        }
        
        .btn-submit:hover {
            background-color: #006b40;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 135, 81, 0.3);
        }
        
        /* Social Login Section */
        .social-login {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .social-login p {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 15px;
        }
        
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            color: var(--dark);
            font-size: 1.2rem;
            text-decoration: none;
            transition: var(--transition);
            border: 1px solid #eee;
        }
        
        .social-icon:hover {
            background: var(--white);
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .social-icon.google:hover { color: #db4437; }
        .social-icon.facebook:hover { color: #4267B2; }
        .social-icon.twitter:hover { color: #1DA1F2; }
        
        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        
        /* Mobile-first adjustments */
        @media (max-width: 360px) {
            .card-header { padding: 30px 20px; }
            .card-body { padding: 20px 15px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="card-header">
            <a href="index.html">
                <img src="assets/images/Screenshot_20260325-094957.jpg" alt="Projet RIS Logo">
            </a>
            <h1>Create Account</h1>
            <p>Join the RIS community today</p>
        </div>
        
        <div class="card-body">
            <form id="regForm">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="e.g. Jean-Paul Biya" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="phone-row">
                        <select id="country" name="country">
                            <option value="+237" selected>🇨🇲 +237</option>
                            <option value="+234">🇳🇬 +234</option>
                            <option value="+221">🇸🇳 +221</option>
                            <option value="+225">🇨🇮 +225</option>
                            <option value="+233">🇬🇭 +233</option>
                        </select>
                        <input type="tel" id="phone" name="phone" placeholder="6XX XXX XXX" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="role">Register as</label>
                    <select id="role" name="role" required>
                        <option value="" disabled selected>Choose your role</option>
                        <option value="student">Student (Athlete/Youth)</option>
                        <option value="mentor">Mentor (Consultant)</option>
                    </select>
                </div>
                
                <div id="mentor-passkey-group" class="form-group">
                    <label for="passkey">Mentor Passkey</label>
                    <input type="password" id="passkey" name="passkey" placeholder="Enter verification code">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
                </div>
                
                <div class="terms-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms and Services</a> and <a href="#">Privacy Policy</a></label>
                </div>
                
                <button type="submit" class="btn-submit">Register Now</button>
            </form>
            
            <div class="social-login">
                <p>or register with</p>
                <div class="social-icons">
                    <a href="#" class="social-icon google" title="Google"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-icon facebook" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-icon twitter" title="Twitter/X"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
            
            <div class="footer-links">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const roleSelect = document.getElementById('role');
            const passkeyGroup = document.getElementById('mentor-passkey-group');
            const passkeyInput = document.getElementById('passkey');

            roleSelect.addEventListener('change', function() {
                if (this.value === 'mentor') {
                    passkeyGroup.style.display = 'block';
                    passkeyInput.setAttribute('required', 'required');
                } else {
                    passkeyGroup.style.display = 'none';
                    passkeyInput.removeAttribute('required');
                }
            });

            document.getElementById('regForm').addEventListener('submit', function(e) {
                e.preventDefault();
                alert('Registration submitted! (Backend integration in Phase 2)');
            });
        });
    </script>
</body>
</html>
